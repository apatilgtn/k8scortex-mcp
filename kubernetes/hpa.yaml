apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kubenexus
  namespace: platform-mcp
  labels:
    app.kubernetes.io/name: kubenexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kubenexus
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
