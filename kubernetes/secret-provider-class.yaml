apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: kubenexus-kv-sync
  namespace: platform-mcp
spec:
  provider: azure
  secretObjects:
  - secretName: mcp-entra-secrets
    type: Opaque
    data:
    - objectName: EntraClientID
      key: ENTRA_CLIENT_ID
    - objectName: EntraTenantID
      key: ENTRA_TENANT_ID
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "your-managed-identity-client-id"
    keyvaultName: "kv-kubenexus-prod"
    objects: |
      array:
        - |
          objectName: EntraClientID
          objectType: secret
        - |
          objectName: EntraTenantID
          objectType: secret
    tenantId: "your-entra-tenant-id"
