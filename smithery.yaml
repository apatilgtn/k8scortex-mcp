name: K8sCortex MCP
description: Production-grade MCP server for Kubernetes — 75 tools across GKE, AKS, EKS, OpenShift and Minikube with RBAC, audit logging, GitOps (ArgoCD + Flux), and multi-cluster support.
license: MIT
qualityScore: production

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      kubeconfig:
        type: string
        description: Path to your kubeconfig file (defaults to ~/.kube/config)
        default: ""
      disableAuth:
        type: boolean
        description: Disable JWT authentication (recommended for local use)
        default: true
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "k8scortex-mcp"],
      env: {
        KUBECONFIG: config.kubeconfig || "",
        DISABLE_AUTH: config.disableAuth !== false ? "true" : "false"
      }
    })
